          <svg
            class="logo-3d"
            viewBox="0 0 100 100"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop
                  offset="0%"
                  style="stop-color: #cee056; stop-opacity: 1"
                />
                <stop
                  offset="100%"
                  style="stop-color: #ebc61d; stop-opacity: 1"
                />
              </linearGradient>
              <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop
                  offset="0%"
                  style="stop-color: #f3f3f2; stop-opacity: 1"
                />
                <stop
                  offset="100%"
                  style="stop-color: #cee056; stop-opacity: 1"
                />
              </linearGradient>
              <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop
                  offset="0%"
                  style="stop-color: #2d322c; stop-opacity: 1"
                />
                <stop
                  offset="100%"
                  style="stop-color: #040b11; stop-opacity: 1"
                />
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="coloredBlur" />
                <feMerge>
                  <feMergeNode in="coloredBlur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>

            <g class="cube-group">
              <polygon
                points="25,30 45,20 65,30 45,40"
                fill="url(#grad2)"
                stroke="#CEE056"
                stroke-width="0.5"
                filter="url(#glow)"
              />
              <polygon
                points="25,30 45,40 45,60 25,50"
                fill="url(#grad1)"
                stroke="#EBC61D"
                stroke-width="0.5"
                filter="url(#glow)"
              />
              <polygon
                points="45,40 65,30 65,50 45,60"
                fill="#8D9B34"
                stroke="#CEE056"
                stroke-width="0.5"
                filter="url(#glow)"
              />
            </g>

            <g class="cube-group cube-2" style="animation-delay: 0.2s">
              <polygon
                points="35,50 50,42 65,50 50,58"
                fill="url(#grad3)"
                stroke="#2D322C"
                stroke-width="0.5"
                filter="url(#glow)"
              />
              <polygon
                points="35,50 50,58 50,73 35,65"
                fill="#2D322C"
                stroke="#040B11"
                stroke-width="0.5"
                filter="url(#glow)"
              />
              <polygon
                points="50,58 65,50 65,65 50,73"
                fill="#CEE056"
                stroke="#8D9B34"
                stroke-width="0.5"
                filter="url(#glow)"
              />
            </g>

            <g class="cube-group cube-3" style="animation-delay: 0.4s">
              <polygon
                points="15,60 32,50 50,60 33,70"
                fill="#040B11"
                stroke="#2D322C"
                stroke-width="0.5"
                opacity="0.7"
                filter="url(#glow)"
              />
              <polygon
                points="15,60 33,70 33,85 15,75"
                fill="#020508"
                stroke="#040B11"
                stroke-width="0.5"
                opacity="0.7"
                filter="url(#glow)"
              />
              <polygon
                points="33,70 50,60 50,75 33,85"
                fill="#2D322C"
                stroke="#2D322C"
                stroke-width="0.5"
                opacity="0.7"
                filter="url(#glow)"
              />
            </g>

            <line
              x1="30"
              y1="25"
              x2="60"
              y2="25"
              stroke="#CEE056"
              stroke-width="1"
              opacity="0.5"
              class="accent-line"
            />
            <line
              x1="25"
              y1="45"
              x2="70"
              y2="45"
              stroke="#EBC61D"
              stroke-width="0.8"
              opacity="0.4"
              class="accent-line"
              style="animation-delay: 0.1s"
            />
            <line
              x1="20"
              y1="65"
              x2="65"
              y2="65"
              stroke="#2D322C"
              stroke-width="0.8"
              opacity="0.3"
              class="accent-line"
              style="animation-delay: 0.2s"
            />
          </svg>